<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, system-ui, "Segoe UI", Helvetica, Arial, sans-serif;

    line-height: 1.6;
    color: #1f2328;
    background: #ffffff;

  img { max-width: 100%; border-radius: 8px; }
  p[align="center"] img { border: 1px solid #d1d9e0; }
